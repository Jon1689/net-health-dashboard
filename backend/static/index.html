<!DOCTYPE html>
<html>
<head>
    <title>Network Health Dashboard</title>
    <style>
        body { font-family: Arial; text-align:center; margin-top:50px; }
        .card {
            display:inline-block;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }
        .ok { color:green; }
        .bad { color:red; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>Network Health Dashboard</h1>
<p><a href="/logout">Logout</a></p>
<p><small>Last updated: <span id="lastUpdated">—</span></small></p>

<div class="card">
  <h2>API Status</h2>
  <p id="status">Checking...</p>
</div>

<br/>

<div class="card" style="min-width: 420px;">
  <h2>Network Checks</h2>
  <div id="checks">Loading checks...</div>
</div>

<br/>

<div class="card" style="min-width: 520px;">
  <h2>Recent History</h2>
  <div id="history">Loading history...</div>
</div>

<br/>

<div class="card" style="min-width: 700px;">
  <h2>Uptime (%)</h2>
  <canvas id="uptimeChart"></canvas>
</div>

<br/>

<div class="card" style="min-width: 700px;">
  <h2>Average Latency (ms)</h2>
  <canvas id="latencyChart"></canvas>
</div>

<script>
async function checkHealth() {
  try {
    const res = await fetch("/health");
    const data = await res.json();
    document.getElementById("status").innerHTML =
      `<span class="ok">✔ ${data.status}</span>`;
  } catch {
    document.getElementById("status").innerHTML =
      `<span class="bad">✖ API Offline</span>`;
  }
}

let uptimeChart = null;
let latencyChart = null;

function renderChecks(results) {
  const rows = results.map(r => {
    const icon = r.ping_ok ? "✔" : "✖";
    const cls = r.ping_ok ? "ok" : "bad";
    const ip = r.ip ? ` (${r.ip})` : "";
    const lat = (r.latency_ms !== null && r.latency_ms !== undefined)
      ? ` — ${r.latency_ms} ms`
      : "";

    return `<div style="text-align:left; margin:6px 0;">
      <span class="${cls}">${icon}</span>
      <strong>${r.name || r.target}</strong> <small>${r.target}${ip}</small>${lat}<br/>
      <small>${r.notes}</small>
    </div>`;
  }).join("");

  document.getElementById("checks").innerHTML = rows || "No results.";
}

async function loadChecks() {
  try {
    const res = await fetch("/checks");
    const data = await res.json();
    renderChecks(data.results || []);
  } catch {
    document.getElementById("checks").innerHTML =
      `<span class="bad">✖ Failed to load checks</span>`;
  }
}

function renderHistory(runs) {
  if (!runs.length) {
    document.getElementById("history").innerHTML = "No history yet.";
    return;
  }

  const html = runs.map(run => {
    const okCount = run.results.filter(r => r.ping_ok).length;
    const total = run.results.length;
    return `<div style="text-align:left; margin:10px 0; padding:8px; border-top:1px solid #ddd;">
      <strong>Run #${run.run_id}</strong> — <small>${run.created_at}</small><br/>
      <small>Reachable: ${okCount}/${total}</small>
    </div>`;
  }).join("");

  document.getElementById("history").innerHTML = html;
}

async function loadHistory() {
  try {
    const res = await fetch("/history?limit=5");
    const data = await res.json();
    renderHistory(data.runs || []);
  } catch {
    document.getElementById("history").innerHTML =
      `<span class="bad">✖ Failed to load history</span>`;
  }
}

function setLastUpdated() {
  const now = new Date();
  document.getElementById("lastUpdated").textContent = now.toLocaleString();
}

function fmtLabel(iso) {
  // Make timestamps readable; fall back if parse fails
  const d = new Date(iso);
  return isNaN(d.getTime()) ? iso : d.toLocaleTimeString();
}

function renderCharts(stats) {
  const labels = (stats.labels || []).map(fmtLabel);
  const uptime = stats.uptime_pct || [];
  const latency = stats.avg_latency_ms || [];

  const uptimeCtx = document.getElementById("uptimeChart");
  const latencyCtx = document.getElementById("latencyChart");

  if (uptimeChart) uptimeChart.destroy();
  if (latencyChart) latencyChart.destroy();

  uptimeChart = new Chart(uptimeCtx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Uptime (%)",
        data: uptime,
        tension: 0.2
      }]
    },
    options: {
      responsive: true,
      scales: {
        y: { min: 0, max: 100 }
      }
    }
  });

  latencyChart = new Chart(latencyCtx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Avg Latency (ms)",
        data: latency,
        tension: 0.2
      }]
    },
    options: {
      responsive: true
    }
  });
}

async function loadStats() {
  try {
    const res = await fetch("/stats?limit=30");
    const data = await res.json();
    renderCharts(data);
  } catch (e) {
    console.log("Failed to load stats", e);
  }
}

/* call these at the bottom */
function refreshAll() {
  setLastUpdated();
  checkHealth();
  loadChecks();
  loadHistory();
  loadStats();
}

refreshAll();
setInterval(refreshAll, 10000); // every 10 seconds

</script>

</body>
</html>
